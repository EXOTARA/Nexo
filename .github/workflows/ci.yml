name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restaurar
        run: dotnet restore .\Nexo.slnx

      - name: Compilar
        run: dotnet build .\Nexo.slnx -c Release --no-restore

      - name: Pruebas
        run: dotnet test .\Nexo.slnx -c Release --no-build --logger "trx;LogFileName=kohana-tests.trx"

      - name: Publicación de comprobación
        shell: pwsh
        run: .\scripts\publish.ps1 -RepositoryUrl "https://github.com/${{ github.repository }}" -SkipTests

      - name: Verificar publicación
        shell: pwsh
        run: .\scripts\verify-release.ps1

      - name: Guardar portable
        uses: actions/upload-artifact@v4
        with:
          name: kohana-win-x64-portable
          path: |
            artifacts/dist/*.zip
            artifacts/dist/*.sha256
          if-no-files-found: error
